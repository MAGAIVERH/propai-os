name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  lint-and-typecheck:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build shared
        run: pnpm --filter @propai/shared build
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
  web-build:
    name: Web build (@propai/shared + @propai/web)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build shared and web
        run: pnpm build:web
  test-api:
    name: API tests (Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: propai
          POSTGRES_PASSWORD: propai
          POSTGRES_DB: propai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U propai -d propai"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://propai:propai@localhost:5432/propai
      BETTER_AUTH_URL: http://localhost:3333
      BETTER_AUTH_SECRET: ci-better-auth-secret-minimum-32-chars
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build shared
        run: pnpm --filter @propai/shared build
      - name: Apply database migrations
        run: pnpm db:migrate
      - name: Run API integration tests
        run: pnpm test:api
  docker-build:
    name: Docker image build (API + worker)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build production image (docker/api/Dockerfile)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/api/Dockerfile
          push: false
          load: true
          tags: propai-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke-check runtime (tsx + both entrypoints, no DB/Redis needed)
        run: |
          docker run --rm --entrypoint sh propai-api:ci -c \
            "node_modules/.bin/tsx --version \
             && test -f src/index.ts \
             && test -f src/worker.ts \
             && echo 'image OK: tsx present, API + worker entrypoints present'"
