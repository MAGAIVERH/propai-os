# Production-style stack for the containerized PropAI API + BullMQ worker.
#
#   docker compose -f docker-compose.prod.yml build
#   BETTER_AUTH_SECRET=<32+ chars> docker compose -f docker-compose.prod.yml up -d
#
# postgres + redis are bundled here for a self-contained run. In real production,
# point DATABASE_URL / DATABASE_APP_URL at Neon and REDIS_BULLMQ_URL at Upstash,
# then remove the postgres/redis services (Day 77).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: propai
      POSTGRES_PASSWORD: propai
      POSTGRES_DB: propai
    volumes:
      - propai_prod_postgres:/var/lib/postgresql/data
      # First boot only (empty volume): creates the propai_app role for RLS.
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U propai -d propai"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - propai_prod_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    image: propai-api:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3333"
      DATABASE_URL: postgresql://propai:propai@postgres:5432/propai
      DATABASE_APP_URL: postgresql://propai_app:propai_app@postgres:5432/propai
      REDIS_BULLMQ_URL: redis://redis:6379
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set BETTER_AUTH_SECRET (min 32 chars)}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3333}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    ports:
      - "3333:3333"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    # Same image as the API, different entrypoint (BullMQ worker).
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    image: propai-api:latest
    restart: unless-stopped
    command: ["node_modules/.bin/tsx", "src/worker.ts"]
    # The worker doesn't serve HTTP, so skip the image's HTTP liveness probe.
    healthcheck:
      disable: true
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://propai:propai@postgres:5432/propai
      DATABASE_APP_URL: postgresql://propai_app:propai_app@postgres:5432/propai
      REDIS_BULLMQ_URL: redis://redis:6379
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set BETTER_AUTH_SECRET (min 32 chars)}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  propai_prod_postgres:
  propai_prod_redis:
