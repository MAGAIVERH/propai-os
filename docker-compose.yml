# PropAI OS — local infrastructure (Docker Compose)
#
# Default (Postgres + Redis only — recommended for daily dev):
#   docker compose up -d
#   pnpm db:migrate
#   pnpm dev                    # API + dashboard on the host (ports 3333, 3000)
#
# Optional API container (heavier; most teams run API via `pnpm dev` on the host):
#   docker compose --profile api up -d
#   curl http://localhost:3333/health
#
# Optional MinIO (S3-compatible storage for Day 18 upload dev):
#   docker compose --profile storage up -d
#   S3_ENDPOINT=http://localhost:9000  (see docs/infra/object-storage.md)
#
# Stop:
#   docker compose down
#   pnpm docker:down            # same as above (root package.json script)
#
# Fresh volume: docker/postgres/init/ creates propai_app role; pnpm db:migrate still required.
#
# Ports (host):
#   PostgreSQL 5432  — DATABASE_URL / DATABASE_APP_URL → localhost:5432
#   Redis      6379  — REDIS_URL → redis://localhost:6379
#   API        3333  — only when profile `api` is active
#   MinIO      9000  — S3 API (profile `storage`)
#   MinIO UI   9001  — console (profile `storage`)

services:
  postgres:
    image: postgres:16-alpine
    container_name: propai-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: propai
      POSTGRES_PASSWORD: propai
      POSTGRES_DB: propai
    volumes:
      - propai_postgres_data:/var/lib/postgresql/data
      # First boot only (empty volume): creates propai_app role before db:migrate
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U propai -d propai"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: propai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - propai_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  # Optional — API in Docker. Prefer `pnpm dev` on the host for faster reload.
  api:
    profiles: ["api"]
    build:
      context: .
      dockerfile: docker/api/Dockerfile.dev
    container_name: propai-api
    restart: unless-stopped
    ports:
      - "3333:3333"
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 3333
      DATABASE_URL: postgresql://propai:propai@postgres:5432/propai
      DATABASE_APP_URL: postgresql://propai_app:propai_app@postgres:5432/propai
      REDIS_URL: redis://redis:6379
      BETTER_AUTH_URL: http://localhost:3333
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Optional — MinIO for local S3-compatible uploads (Day 18). Prefer profile `storage`.
  minio:
    profiles: ["storage"]
    image: minio/minio:latest
    container_name: propai-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      # Browser presigned PUT/GET from dashboard (see docs/infra/object-storage.md)
      MINIO_API_CORS_ALLOW_ORIGIN: http://localhost:3000
    volumes:
      - propai_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    profiles: ["storage"]
    image: minio/mc:latest
    container_name: propai-minio-init
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./docker/minio/init:/init:ro
    entrypoint: ["/bin/sh", "/init/bootstrap.sh"]
    restart: "no"

volumes:
  propai_postgres_data:
  propai_redis_data:
  propai_minio_data:
